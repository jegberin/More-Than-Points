kind = "web"
previewPath = "/"
title = "More Than Points"
version = "1.0.0"
id = "artifacts/more-than-points"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23923

[services.development]
run = "pnpm --filter @workspace/more-than-points run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/more-than-points", "run", "build" ]
publicDir = "artifacts/more-than-points/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23923"
BASE_PATH = "/"
